<title>manhattan gps watch > map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"

<style>
  @font-face { font-family: "Silkscreen"; font-display: swap;
    src: url("../../fonts/silkscreen-latin-400-normal.woff2") format("woff2"); }
  @font-face { font-family: "IBM Plex Mono"; font-weight: 300; font-display: swap;
    src: url("../../fonts/ibm-plex-mono-latin-300-normal.woff2") format("woff2"); }

    --case: #34373b; --case-hi: #4b4f54; --case-lo: #212327;

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body { font-family: -apple-system, "Segoe UI", system-ui, Roboto, sans-serif; }
  #map { position: absolute; inset: 0; z-index: 1; background: #aab; }

  /* Floating watch HUD */
  .hud {
    position: absolute; z-index: 1000; top: 14px; right: 14px; width: 260px;
    background: linear-gradient(150deg, var(--case-hi), var(--case) 42%, var(--case-lo));
    border-radius: 22px; padding: 16px 15px 15px;
    box-shadow: 0 10px 26px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.12);
    color: #fff;
  }
  @media (max-width: 560px) {
    .hud { top: auto; bottom: 10px; right: 10px; left: 10px; width: auto; }
  }
  .brand { text-align: center; color: #cdd0d4; font-size: 9px; letter-spacing: .22em;
           text-transform: uppercase; margin-bottom: 8px; opacity: .85; }
  .lcd {
    background: linear-gradient(170deg, #14171b, #0b0d10);
    border-radius: 7px; padding: 11px 12px 10px; color: #c9cdc2;
    font-family: "IBM Plex Mono", ui-monospace, "Cascadia Mono", Consolas, monospace;
    font-variant-numeric: tabular-nums; position: relative; overflow: hidden;
    border: 1px solid rgba(255,255,255,.05);
  }
  .lcd::after { content: ""; position: absolute; inset: 0;
    background: linear-gradient(105deg, rgba(255,255,255,.05), transparent 40%); pointer-events: none; }
  .lcd-top { display: flex; justify-content: space-between; align-items: baseline; font-size: 11px;
             border-bottom: 1px solid rgba(255,255,255,.08); padding-bottom: 5px; margin-bottom: 7px; }
  .mode { font-weight: 700; letter-spacing: .1em; color: #8b9184; }
  .odo { font-weight: 700; letter-spacing: .08em; color: #8b9184; }
  .hero { text-align: center; margin: 3px 0 4px; }
  .reading { font-family: "Silkscreen", "IBM Plex Mono", monospace; font-size: 24px; font-weight: 400;
    line-height: 1.15; white-space: nowrap; color: #e0243f; text-shadow: 0 0 12px rgba(224,36,63,.35); }
  .reading .x { font-family: "IBM Plex Mono", monospace; opacity: .6; margin: 0 .12em; font-weight: 300;
    color: #e0243f; text-shadow: none; }
  .reading.toofar { font-size: 16px; font-weight: 400; letter-spacing: .02em; text-transform: lowercase; }
  .caption { display: none; }
  .hoodline { text-align: center; font-size: 10px; font-weight: 400; letter-spacing: .12em;
    text-transform: lowercase; color: #8ea38a; opacity: .9;
    border-top: 1px solid rgba(255,255,255,.08); margin-top: 7px; padding-top: 7px; }
  .lcd-sub { display: flex; align-items: center; justify-content: center; gap: 5px; flex-wrap: wrap;
    border-top: 1px solid rgba(255,255,255,.08); margin-top: 7px; padding-top: 7px; font-size: 10px; color: #8b9184; }
  .lcd-sub .slabel { font-size: 8.5px; letter-spacing: .14em; text-transform: uppercase; color: #6b7168; }
  .lcd-sub .coord { font-family: "Silkscreen", monospace; font-size: 11px; color: #c9cdc2; }
  .lcd-sub .coord .x { font-family: "IBM Plex Mono", monospace; opacity: .5; margin: 0 .1em; }
  .lcd-sub .arrow { display: inline-block; color: #c9cdc2; font-family: "IBM Plex Mono", monospace; }
  .bullet { display: inline-flex; width: 16px; height: 16px; border-radius: 50%; align-items: center;
    justify-content: center; font: 700 9px/1 "IBM Plex Mono", monospace; color: #fff; }
  .lcd-bot { display: flex; justify-content: space-between; align-items: baseline;
             border-top: 1px solid rgba(255,255,255,.08); padding-top: 7px; margin-top: 7px; }
  .clock { font-size: 20px; font-weight: 700; color: #c9cdc2; }
  .clock .sec { font-size: 12px; opacity: .6; }
  .colon.blink { animation: blink 1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: .25; } }
  @media (prefers-reduced-motion: reduce) { .colon.blink { animation: none; } }
  .fix { font-size: 10px; opacity: .6; text-align: right; }
  .cameo { display: none; margin: 10px 2px 0; font-size: 10.5px; line-height: 1.5; color: #b7c3b2; }
  .cameo.show { display: block; }

  .ctrls button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }

  .ctrls .row { display: flex; gap: 6px; width: 100%; }
  .ctrls .row button { flex: 1; }

  .panel {
    position: absolute; z-index: 1000; bottom: 14px; left: 14px; max-width: 300px;

  function nearestStation(st, ave){ var b=null,bd=Infinity; for(var i=0;i<STATIONS.length;i++){var s=STATIONS[i];
    var d=(st-s[0])*(st-s[0])+10.9*(ave-s[1])*(ave-s[1]); if(d<bd){bd=d;b=s;}} return b; }
  function nearestCameo(st, ave){ var b=null,bd=Infinity; for(var i=0;i<CAMEOS.length;i++){var c=CAMEOS[i];
    var d=Math.sqrt((st-c[0])*(st-c[0])+10.9*(ave-c[1])*(ave-c[1])); if(d<c[2]&&d<bd){bd=d;b=c;}} return b; }
  function bullets(lines){ return lines.map(function(l){
    return '<span class="bullet" style="background:'+(LINES[l]||"#666")+';color:'+(YELLOW[l]?"#111":"#fff")+'">'+l+'</span>';
  }).join(""); }
  function fmtCoord(s){ return d1(labelStreet(s[0])) + '<span class="x">×</span>' + d1(s[1]); }

  var odoStreets = 0, odoPrevSt = null;

  // ---- MAP ----
  var map = L.map("map", { zoomControl: true }).setView([40.7580, -73.9855], 13);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
  }).addTo(map);

  var marker = L.marker([40.7580, -73.9855], { draggable: true }).addTo(map);

  var shown = { lat: 40.7580, lon: -73.9855 };

  function fmtGrid(v) { return (Math.round(v * 100) / 100).toFixed(2); }

  function updateWatch(fixLabel) {
    var r = reading(shown.lat, shown.lon);
    var el = document.getElementById("reading");
    if (r.far) {
      el.className = "reading toofar"; el.textContent = "THE SUBURBS";
      document.getElementById("caption").textContent = "not manhattan";
      document.getElementById("hood").textContent = "—";
    } else {
      el.className = "reading";
      el.innerHTML = r.stTxt + '<span class="x">×</span>' + r.aveTxt;
      document.getElementById("caption").textContent = "street × avenue";
      document.getElementById("hood").textContent = r.hood || "—";
    }
    document.getElementById("coords").innerHTML =
      "<b>lat</b> " + shown.lat.toFixed(5) + "  <b>lon</b> " + shown.lon.toFixed(5) +
      "<br><b>model</b> street " + fmtGrid(r.st) + " · avenue " + fmtGrid(r.ave) +
      (r.hood ? "<br><b>area</b> " + r.hood : "");
    // nearest subway (coordinate + arrow toward station + bullets), fun fact, street odometer
    var stn = nearestStation(r.st, r.ave);
    document.getElementById("subwayLine").innerHTML =
      '<span class="slabel">nearest subway</span>'
      + '<span class="arrow" style="transform:rotate(' + subwayBearing(r.st, r.ave, stn) + 'deg)">↑</span>'
      + '<span class="coord">' + fmtCoord(stn) + '</span>' + bullets(stn[2]);
    var cam = nearestCameo(r.st, r.ave);
    var hood = r.hood || neighborhood(r.ave, r.st);
    var fact = cam ? cam[3] : (FACTS[hood] || null);
    var cEl = document.getElementById("cameo");
    if (fact) { cEl.className = "cameo show"; cEl.innerHTML = '<span class="ctag">▸ you are here</span>' + fact; }
    else { cEl.className = "cameo"; }
    if (odoPrevSt != null) odoStreets += Math.abs(r.st - odoPrevSt);
    odoPrevSt = r.st;
    document.getElementById("odo").textContent = Math.round(odoStreets) + " st";
    if (fixLabel) document.getElementById("fix").textContent = fixLabel;
  }

  function moved(lat, lon) {
    shown.lat = lat; shown.lon = lon; updateWatch("FIX live");
  }

  marker.on("drag", function (e) { var p = e.target.getLatLng(); moved(p.lat, p.lng); });
  map.on("click", function (e) { marker.setLatLng(e.latlng); moved(e.latlng.lat, e.latlng.lng); });

  function setPin(lat, lon, fly) {
    marker.setLatLng([lat, lon]);
    shown.lat = lat; shown.lon = lon;
    if (fly) map.setView([lat, lon], Math.max(map.getZoom(), 14));
    updateWatch("FIX now");
  }

  // ---- Controls ----
  document.getElementById("refreshBtn").addEventListener("click", function () {
    var p = marker.getLatLng(); shown.lat = p.lat; shown.lon = p.lng; updateWatch("FIX now");
  });
  document.getElementById("locateBtn").addEventListener("click", function () {
    if (!navigator.geolocation) { alert("Geolocation not available in this browser."); return; }
    document.getElementById("fix").textContent = "locating…";
    navigator.geolocation.getCurrentPosition(
      function (pos) { setPin(pos.coords.latitude, pos.coords.longitude, true); },
      function (err) {
        document.getElementById("fix").textContent = "FIX now";
        alert("Couldn't get your location: " + err.message +
              "\n\n(Browsers often block GPS for files opened directly. It works when the page is served over http/https.)");
      }, { enableHighAccuracy: true, timeout: 10000 });
  });

  // ---- Grid overlay (streets & avenues from the model) ----
  var gridLayer = L.layerGroup();
  var gridOn = false;
  (function buildGrid() {
    var s, a, e;
    for (s = 0; s <= 135; s += 1) {
      e = [[toLatLon(AVE_MIN, s).lat, toLatLon(AVE_MIN, s).lon],
           [toLatLon(AVE_MAX, s).lat, toLatLon(AVE_MAX, s).lon]];
      L.polyline(e, { color: "#c1432a", weight: (s % 10 === 0) ? 1.4 : 0.5,
                      opacity: (s % 10 === 0) ? 0.7 : 0.4 }).addTo(gridLayer);
    }
    for (a = 1; a <= 12; a += 1) {
      e = [[toLatLon(a, ST_MIN).lat, toLatLon(a, ST_MIN).lon],
           [toLatLon(a, ST_MAX).lat, toLatLon(a, ST_MAX).lon]];
      L.polyline(e, { color: "#1f6f8b", weight: 0.9, opacity: 0.5 }).addTo(gridLayer);
    }
  })();

  var DAYS = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
  function tick() {
    var d = new Date();
    var hh = String(d.getHours()).padStart(2, "0");
    var mm = String(d.getMinutes()).padStart(2, "0");
    var ss = String(d.getSeconds()).padStart(2, "0");
    document.getElementById("clock").innerHTML =
      hh + '<span class="colon blink">:</span>' + mm + '<span class="sec">·' + ss + '</span>';
    document.getElementById("dateStr").textContent = DAYS[d.getDay()] + " " + (d.getMonth() + 1) + "-" + d.getDate();
  }

  updateWatch("FIX now"); tick(); setInterval(tick, 1000);
})();
