<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0d0f12">
<title>manhattan gps watch > live</title>
<style>
  @font-face {
    font-family: "IBM Plex Mono";
    font-style: normal;
    font-weight: 300;
    font-display: swap;
    src: url("../../fonts/ibm-plex-mono-latin-300-normal.woff2") format("woff2");
  }
  @font-face {
    font-family: "Silkscreen";
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url("../../fonts/silkscreen-latin-400-normal.woff2") format("woff2");
  }
  :root {
    --bg: #0d0f12; --panel: #16191d; --ink: #f4f5f0; --muted: #8b9184;
    --accent: #ff6a3d; --lcd: #a8b79a;
    --ok: #4ade80; --warn: #fbbf24; --bad: #f87171;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--ink); overflow: hidden;
    font-family: -apple-system, "Segoe UI", system-ui, Roboto, sans-serif;
    font-variant-numeric: tabular-nums;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  #app { height: 100%; display: flex; flex-direction: column; }

  /* status bar */
  .status {
    display: flex; align-items: center; gap: 9px; padding: 14px 18px;
    font-size: 14px; color: var(--muted); border-bottom: 1px solid #23272c;
  }
  .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--muted); flex: none; }
  .dot.ok { background: var(--ok); } .dot.warn { background: var(--warn); } .dot.bad { background: var(--bad); }
  .status .age { margin-left: auto; font-variant-numeric: tabular-nums; }

  /* main readout */
  .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 12px; }
  .reading {
    font-family: "Silkscreen", "IBM Plex Mono", ui-monospace, monospace;
    font-weight: 400; letter-spacing: 0.02em; line-height: 1; text-align: center;
    font-size: clamp(30px, 9vw, 56px); white-space: nowrap; color: #e0243f;
    text-shadow: 0 0 14px rgba(224,36,63,0.35);
  }
  .reading .x { font-family: "IBM Plex Mono", monospace; color: #e0243f; font-weight: 300; opacity: 0.6;
    margin: 0 0.2em; text-shadow: none; }
  .reading.suburbs { font-size: clamp(24px, 7vw, 44px); letter-spacing: 0.02em; text-transform: lowercase; }
  .caption { display: none; }
  .hood {
    font-size: clamp(12px, 3.4vw, 15px); font-weight: 400; letter-spacing: 0.18em;
    text-transform: lowercase; color: var(--lcd); opacity: 0.75; text-align: center; min-height: 1.2em;
  }

  /* footer meta */
  .meta { padding: 10px 18px calc(30px + env(safe-area-inset-bottom)); font-size: 12px; color: var(--muted); text-align: center; line-height: 1.7; }
  .meta b { color: #c9cdc2; font-weight: 600; }

  /* start button / overlay */
  .start {
    position: fixed; inset: 0; background: var(--bg); z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px; padding: 32px;
    text-align: center;
  }
  .start h1 { font-size: 26px; margin: 0; font-weight: 800; }
  .start p { margin: 0; max-width: 30ch; color: var(--muted); line-height: 1.5; font-size: 15px; }
  .start button, .retry {
    font: inherit; font-weight: 700; font-size: 19px; color: #fff; background: var(--accent);
    border: none; border-radius: 14px; padding: 18px 40px; cursor: pointer;
  }
  .start button:active { transform: translateY(1px); }
  .hidden { display: none !important; }
  .err { color: var(--bad); font-size: 14px; max-width: 32ch; line-height: 1.5; }
  .brand { position: fixed; bottom: calc(8px + env(safe-area-inset-bottom)); left: 0; right: 0; text-align: center;
           font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: #3a3f45; }
</style>
</head>

  document.addEventListener("visibilitychange", function () { if (document.visibilityState === "visible") keepAwake(); });

  function start() {
    if (!("geolocation" in navigator)) {
      dot.className = "dot bad";
      statusText.textContent = "this browser has no GPS support";
      return;
    }
    statusText.textContent = "acquiring GPS…";
    keepAwake();
    watchId = navigator.geolocation.watchPosition(onPosition, onError,
      { enableHighAccuracy: true, maximumAge: 1500, timeout: 20000 });
  }
  // wake-lock needs a gesture, so grab it on first touch; GPS starts immediately
  document.addEventListener("pointerdown", function once() { keepAwake(); document.removeEventListener("pointerdown", once); });
  start();
})();
</script>
</body>
</html>
