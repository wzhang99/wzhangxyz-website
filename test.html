<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=Silkscreen&display=swap" rel="stylesheet">
<style>
  :root { --bg:#08090b; --ink:#e7e9e4; --dim:#6b7079; --line:#1c1f24; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    background: radial-gradient(120% 80% at 50% -10%, #12151a 0%, #08090b 55%) fixed, var(--bg);
    color:var(--ink); font-family:"IBM Plex Mono", ui-monospace, monospace;
    -webkit-font-smoothing:antialiased; min-height:100vh; padding:40px 28px 80px;
  }
  header { max-width:1180px; margin:0 auto 34px; }
  h1 { font-size:15px; font-weight:600; letter-spacing:.36em; text-transform:uppercase; }
  .sub { margin-top:10px; color:var(--dim); font-size:12.5px; line-height:1.7; max-width:70ch; }
  .sub b { color:#9aa0a8; font-weight:400; }
  .controls { margin-top:18px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .controls span { color:var(--dim); font-size:11px; letter-spacing:.14em; text-transform:uppercase; margin-right:4px; }
  .controls button {
    font:inherit; font-size:11.5px; letter-spacing:.06em; cursor:pointer; color:#cbd0d6;
    background:rgba(255,255,255,.04); border:1px solid var(--line); border-radius:999px; padding:6px 14px;
    transition:border-color .18s,color .18s,background .18s;
  }
  .controls button:hover { border-color:#3a4049; color:#fff; }
  .controls button.active { border-color:#6ec6bd; color:#b9ede7; background:rgba(94,207,202,.08); }

  .grid { max-width:1180px; margin:0 auto; display:grid;
    grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:16px; }

  .card {
    position:relative; overflow:hidden; border:1px solid var(--line); border-radius:16px;
    min-height:196px; display:flex; flex-direction:column; justify-content:center; align-items:center;
    padding:42px 18px 38px; background:#050505;
    opacity:0; transform:translateY(10px); animation:rise .5s cubic-bezier(.2,.7,.2,1) forwards;
  }
  @keyframes rise { to { opacity:1; transform:none; } }

  .card .label { position:absolute; top:13px; left:15px; z-index:3;
    font:10px/1.3 "IBM Plex Mono", monospace; letter-spacing:.1em; text-transform:lowercase; color:#565c65; }

  .reading { text-align:center; }
  .cross { display:inline-flex; align-items:baseline; justify-content:center; white-space:nowrap; line-height:1;
    font-family:"Silkscreen"; font-size:34px; color:var(--c); text-shadow:0 0 11px var(--glow); }
  .sub-read { display:none; line-height:1; font-family:"Silkscreen"; font-size:21px; color:var(--c);
    text-shadow:0 0 11px var(--glow); }
  .x { font-family:"IBM Plex Mono", monospace; font-weight:300; color:var(--c); opacity:.7; margin:0 .14em;
    text-shadow:none; }
  .hood { margin-top:13px; font-family:"Silkscreen"; font-size:10px; letter-spacing:.08em; color:var(--c); opacity:.5; }
  body.suburbs .cross { display:none; }
  body.suburbs .sub-read { display:inline-flex; }
  body.suburbs .hood { visibility:hidden; }

  @media (prefers-reduced-motion:reduce) { .card { animation:none; opacity:1; transform:none; } }
</style>
</head>
<body>
<header>
  <h1>test</h1>
  <p class="sub">The pixel readout you liked (<b>Silkscreen</b>, refs 04 &amp; 05) in a full range of colors.
    Each card notes its name + hex. Toggle <b>manhattan / the suburbs</b> to see both states. Call out the
    hex(es) you want — I can also tune glow strength, background, or pixel size on the winner.</p>
  <div class="controls">
    <span>reading</span>
    <button id="btn-man" class="active" type="button">manhattan</button>
    <button id="btn-sub" type="button">the suburbs</button>
  </div>
</header>

<main class="grid" id="grid"></main>

<script>
  var COLORS = [
    ["warm white  (ref 04)", "#f1ece0"],
    ["pure white",           "#ffffff"],
    ["cool grey",            "#aeb4bd"],
    ["signal red  (ref 05)", "#ff443a"],
    ["crimson",              "#e0243f"],
    ["coral",                "#ff6f61"],
    ["orange",               "#ff7a1a"],
    ["amber",                "#ffb000"],
    ["gold",                 "#ffcf33"],
    ["sunflower",            "#ffe14d"],
    ["lime",                 "#b6ff3a"],
    ["phosphor green",       "#74e874"],
    ["mint",                 "#4ade80"],
    ["emerald",              "#2ee6a6"],
    ["seafoam",              "#7fffd4"],
    ["teal",                 "#5ecfca"],
    ["cyan",                 "#38e1ff"],
    ["ice blue",             "#86d9ff"],
    ["sky",                  "#4aa8ff"],
    ["royal blue",           "#5b6bff"],
    ["periwinkle",           "#8b8bff"],
    ["violet",               "#b98cff"],
    ["magenta",              "#ff5cf0"],
    ["hot pink",             "#ff4d9d"]
  ];

  function rgb(hex) {
    var h = hex.replace("#", "");
    return { r: parseInt(h.slice(0,2),16), g: parseInt(h.slice(2,4),16), b: parseInt(h.slice(4,6),16) };
  }

  document.getElementById("grid").innerHTML = COLORS.map(function (c, i) {
    var name = c[0], hex = c[1], p = rgb(hex);
    var glow = "rgba(" + p.r + "," + p.g + "," + p.b + ",.5)";
    return '<div class="card" style="--c:' + hex + ';--glow:' + glow + ';animation-delay:' + (i * 0.025) + 's">' +
      '<span class="label">' + name + ' &nbsp;' + hex + '</span>' +
      '<div class="reading">' +
        '<div class="cross"><span>54</span><span class="x">×</span><span>7.5</span></div>' +
        '<div class="sub-read">the suburbs</div>' +
        '<div class="hood">east village</div>' +
      '</div>' +
    '</div>';
  }).join("");

  var man = document.getElementById("btn-man"), sub = document.getElementById("btn-sub");
  man.addEventListener("click", function () {
    document.body.classList.remove("suburbs"); man.classList.add("active"); sub.classList.remove("active");
  });
  sub.addEventListener("click", function () {
    document.body.classList.add("suburbs"); sub.classList.add("active"); man.classList.remove("active");
  });
</script>
</body>
</html>
